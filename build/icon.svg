<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.28)"/>
    </radialGradient>
  </defs>
  <!-- Frost white base -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="#F2EFE9"/>
  <!-- Dark vignette overlay -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#vignette)"/>
  <!-- Golden "lumi" text -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, Arial, sans-serif" font-size="280" font-weight="700"
    fill="url(#textGrad)" letter-spacing="-10">lumi</text>
</svg>
